<!DOCTYPE html>
<html>
<head>
  <title>How's the weather</title>
  <link rel="stylesheet" href="theme1.css">
  <link href="https://fonts.googleapis.com/css2?family=Mansalva&display=swap" rel="stylesheet"> <!--font;Mansalva-->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/favi.svg">

</head>
<body>

<div class="window">
   
    <div class="title">
    <h1>How's the weather today?</h1>
    </div> <!--title-->

    <div class="resultArea">
        <div class="resultImgArea" >
            <p class="introText">Please enter your country and city</p>
            <img src="something.jpg" id="resultImg" alt="result_img" width="390" height="240">
            </div><!--result Img-->

        <div id="resultTxt" >
        <p>weather result text</p>
        </div> <!--result text-->

    </div> <!--resultArea-->

    <div class="inputArea">
    <input type="text" id="countryInput" placeholder="Country">
    <input type="text" id="cityInput" placeholder="City">
    </div> <!--inputArea-->

    <div class="buttonArea">
        <button type="button" id="confirmBtn">Confirm</button>
    </div> <!--buttonArea-->
</div> <!--window-->

<script src="weatherApp.js"></script>

</body>
</html>
